# Composición de servicios para desarrollo y evaluación local.
# Levanta la infraestructura (PostgreSQL) y los microservicios de aplicación.

services:
  postgres:
    image: postgres:16-alpine
    container_name: mariposa-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-biblioteca}
      POSTGRES_USER: ${POSTGRES_USER:-biblioteca_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cambiar_en_local}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_datos:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - "pg_isready -U ${POSTGRES_USER:-biblioteca_app} -d ${POSTGRES_DB:-biblioteca}"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - mariposa-red

  servicio-biblioteca:
    build:
      context: ./servicio-biblioteca
      dockerfile: Dockerfile
    container_name: mariposa-servicio-biblioteca
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVICIO_BIBLIOTECA_PERFIL: docker
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-biblioteca}
      POSTGRES_USER: ${POSTGRES_USER:-biblioteca_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cambiar_en_local}
      JWT_CLAVE_SECRETA: ${JWT_CLAVE_SECRETA:-clave-de-prueba-de-minimo-32-bytes-para-HS256-mariposa}
      JWT_DURACION_ACCESO_MINUTOS: ${JWT_DURACION_ACCESO_MINUTOS:-15}
      JWT_DURACION_REFRESCO_DIAS: ${JWT_DURACION_REFRESCO_DIAS:-7}
      JWT_EMISOR: ${JWT_EMISOR:-mariposa-biblioteca}
      NIVEL_LOG_ROOT: ${NIVEL_LOG_ROOT:-INFO}
      NIVEL_LOG_APLICACION: ${NIVEL_LOG_APLICACION:-INFO}
    ports:
      - "${SERVICIO_BIBLIOTECA_PUERTO:-8080}:8080"
    networks:
      - mariposa-red
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  postgres-prestamos:
    image: postgres:16-alpine
    container_name: mariposa-postgres-prestamos
    environment:
      POSTGRES_DB: ${POSTGRES_PRESTAMOS_DB:-prestamos}
      POSTGRES_USER: ${POSTGRES_PRESTAMOS_USER:-prestamos_app}
      POSTGRES_PASSWORD: ${POSTGRES_PRESTAMOS_PASSWORD:-cambiar_en_local}
    ports:
      - "${POSTGRES_PRESTAMOS_PORT:-5433}:5432"
    volumes:
      - postgres_prestamos_datos:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - "pg_isready -U ${POSTGRES_PRESTAMOS_USER:-prestamos_app} -d ${POSTGRES_PRESTAMOS_DB:-prestamos}"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - mariposa-red

  servicio-prestamos:
    build:
      context: ./servicio-prestamos
      dockerfile: Dockerfile
    container_name: mariposa-servicio-prestamos
    depends_on:
      postgres-prestamos:
        condition: service_healthy
    environment:
      SERVICIO_PRESTAMOS_PUERTO: 8081
      POSTGRES_PRESTAMOS_HOST: postgres-prestamos
      POSTGRES_PRESTAMOS_PORT: 5432
      POSTGRES_PRESTAMOS_DB: ${POSTGRES_PRESTAMOS_DB:-prestamos}
      POSTGRES_PRESTAMOS_USER: ${POSTGRES_PRESTAMOS_USER:-prestamos_app}
      POSTGRES_PRESTAMOS_PASSWORD: ${POSTGRES_PRESTAMOS_PASSWORD:-cambiar_en_local}
      SERVICIO_BIBLIOTECA_URL: http://servicio-biblioteca:8080
      SERVICIO_INTERNO_SECRETO: ${SERVICIO_INTERNO_SECRETO:-secreto-compartido-mariposa-cambiar-en-produccion}
      HTTP_CLIENTE_TIMEOUT_SEGUNDOS: 5
    ports:
      - "${SERVICIO_PRESTAMOS_PUERTO:-8081}:8081"
    networks:
      - mariposa-red
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8081/salud"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  mariposa-red:
    driver: bridge

volumes:
  postgres_datos:
    name: mariposa-postgres-datos
  postgres_prestamos_datos:
    name: mariposa-postgres-prestamos-datos
