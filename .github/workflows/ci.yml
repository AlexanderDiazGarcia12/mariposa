name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-biblioteca:
    name: Servicio Biblioteca · Tests (Java 21)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: servicio-biblioteca
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: servicio-biblioteca/pom.xml

      - name: Validar formato del POM
        run: ./mvnw -B -ntp validate

      - name: Compilar
        run: ./mvnw -B -ntp -DskipTests compile test-compile

      - name: Ejecutar tests (unitarios + Testcontainers)
        env:
          TESTCONTAINERS_RYUK_DISABLED: 'true'
        run: ./mvnw -B -ntp test

      - name: Publicar reportes de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reportes-biblioteca
          path: |
            servicio-biblioteca/target/surefire-reports/**
            servicio-biblioteca/target/site/jacoco/**
          retention-days: 7
          if-no-files-found: ignore

  test-prestamos:
    name: Servicio Préstamos · Tests (Go 1.25)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: servicio-prestamos
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: servicio-prestamos/go.sum

      - name: Verificar go.mod / go.sum
        run: |
          go mod download
          go mod verify

      - name: Comprobar formato (gofmt)
        run: |
          archivos_sin_formato=$(gofmt -l .)
          if [ -n "$archivos_sin_formato" ]; then
            echo "Archivos sin formato gofmt:" >&2
            echo "$archivos_sin_formato" >&2
            exit 1
          fi

      - name: Análisis estático (go vet)
        run: go vet ./...

      - name: Compilar
        run: go build ./...

      - name: Ejecutar tests (incluye Testcontainers)
        env:
          TESTCONTAINERS_RYUK_DISABLED: 'true'
        run: go test -race -count=1 -timeout 10m ./...

  build-imagenes:
    name: Build de imágenes Docker
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test-biblioteca, test-prestamos]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagen servicio-biblioteca
        uses: docker/build-push-action@v6
        with:
          context: ./servicio-biblioteca
          file: ./servicio-biblioteca/Dockerfile
          push: false
          load: true
          tags: mariposa/servicio-biblioteca:ci
          cache-from: type=gha,scope=biblioteca
          cache-to: type=gha,scope=biblioteca,mode=max

      - name: Build imagen servicio-prestamos
        uses: docker/build-push-action@v6
        with:
          context: ./servicio-prestamos
          file: ./servicio-prestamos/Dockerfile
          push: false
          load: true
          tags: mariposa/servicio-prestamos:ci
          cache-from: type=gha,scope=prestamos
          cache-to: type=gha,scope=prestamos,mode=max

      - name: Validar docker-compose
        run: docker compose config --quiet

  resumen:
    name: Resumen CI
    runs-on: ubuntu-latest
    needs: [test-biblioteca, test-prestamos, build-imagenes]
    if: always()
    steps:
      - name: Verificar estado de los jobs previos
        run: |
          if [ "${{ needs.test-biblioteca.result }}" != "success" ] \
             || [ "${{ needs.test-prestamos.result }}" != "success" ] \
             || [ "${{ needs.build-imagenes.result }}" != "success" ]; then
            echo "Algún job falló:"
            echo "  test-biblioteca: ${{ needs.test-biblioteca.result }}"
            echo "  test-prestamos:  ${{ needs.test-prestamos.result }}"
            echo "  build-imagenes:  ${{ needs.build-imagenes.result }}"
            exit 1
          fi
          echo "Todos los jobs completaron correctamente."
