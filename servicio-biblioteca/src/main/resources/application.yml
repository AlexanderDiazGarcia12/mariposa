spring:
  application:
    name: servicio-biblioteca
  profiles:
    active: ${SERVICIO_BIBLIOTECA_PERFIL:local}
  jpa:
    properties:
      hibernate:
        timezone:
          default_storage: NORMALIZE_UTC

server:
  port: ${SERVICIO_BIBLIOTECA_PUERTO:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true
  health:
    db:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    descripcion: Microservicio de gestión de catálogo y autenticación de la biblioteca

seguridad:
  jwt:
    clave-secreta: ${JWT_CLAVE_SECRETA:una-clave-de-prueba-de-minimo-32-bytes-para-HS256-tests-mariposa}
    duracion-acceso-minutos: ${JWT_DURACION_ACCESO_MINUTOS:15}
    duracion-refresco-dias: ${JWT_DURACION_REFRESCO_DIAS:7}
    emisor: ${JWT_EMISOR:mariposa-biblioteca}
  interno:
    secreto: ${SERVICIO_INTERNO_SECRETO:secreto-interno-pruebas-minimo-16-caracteres}
  limite-tasa:
    inicio-sesion:
      habilitado: ${LIMITE_TASA_INICIO_SESION_HABILITADO:true}
      capacidad: ${LIMITE_TASA_INICIO_SESION_CAPACIDAD:5}
      ventana-segundos: ${LIMITE_TASA_INICIO_SESION_VENTANA_SEGUNDOS:60}

servicio:
  prestamos:
    url-base: ${SERVICIO_PRESTAMOS_URL_BASE:http://servicio-prestamos:8081}
    timeout-conexion-ms: ${HTTP_CLIENTE_TIMEOUT_CONEXION_MS:2000}
    timeout-lectura-ms: ${HTTP_CLIENTE_TIMEOUT_LECTURA_MS:5000}

resilience4j:
  circuitbreaker:
    instances:
      clientePrestamos:
        registerHealthIndicator: false
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
  retry:
    instances:
      clientePrestamos:
        maxAttempts: 3
        waitDuration: 500ms
        retryExceptions:
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true
    persist-authorization: true
  show-actuator: false
  packages-to-scan: com.mariposa.biblioteca.infraestructura.web.controladores
